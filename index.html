<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://vibej.am/2026/widget.js"></script>
    <title>Sock Climber</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      /* ── UI layer ─────────────────────────────────────────────────────── */
      .hidden { display: none !important; }

      /* Full-screen overlay panels */
      #title, #pause, #settings, #game-over, #level-select {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: rgba(0, 0, 0, 0.78);
        color: #f0f0f0;
        font-family: sans-serif;
        z-index: 10;
      }

      /* ── Patch picker modal ──────────────────────────────────────────── */
      #patch-picker {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: rgba(0, 0, 0, 0.78);
        color: #f0f0f0;
        font-family: sans-serif;
        z-index: 20;
      }
      #patch-picker h2 {
        font-size: 1.6rem;
        letter-spacing: 0.04em;
        color: #ffd66e;
      }
      #patch-picker .patch-options {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        gap: 1rem;
        width: min(960px, 95%);
        flex-wrap: wrap;
      }
      #patch-picker .patch-btn {
        position: relative;
        flex: 1 1 220px;
        max-width: 280px;
        min-width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        padding: 1rem 0.9rem 1.1rem;
        background: rgba(28, 28, 36, 0.92);
        border: 2px solid #4a4a55;
        border-radius: 10px;
        color: #f0f0f0;
        font-family: inherit;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.12s ease, background-color 0.12s ease, transform 0.12s ease;
      }
      #patch-picker .patch-btn:hover,
      #patch-picker .patch-btn:focus-visible,
      #patch-picker .patch-btn.focused {
        border-color: #ffd66e;
        background: rgba(48, 44, 28, 0.92);
        transform: translateY(-2px);
        outline: none;
      }
      #patch-picker .patch-btn .menu-arrow {
        position: absolute;
        top: 0.5rem;
        left: 0.6rem;
        color: #ffd66e;
        font-size: 1rem;
        line-height: 1;
      }
      #patch-picker .patch-icon {
        width: 96px;
        height: 96px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        pointer-events: none;
      }
      #patch-picker .patch-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
      }
      #patch-picker .patch-name {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #ffd66e;
      }
      #patch-picker .patch-desc {
        font-size: 0.88rem;
        line-height: 1.35;
        color: #d8d8d8;
      }

      /* HUD — top-left corner, never blocks clicks on the game */
      #hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #f0f0f0;
        font-family: monospace;
        font-size: 0.9rem;
        z-index: 10;
        pointer-events: none;
      }

      /* ── HP container row (top-right) ────────────────────────────────── */
      #hud-hp {
        position: fixed;
        top: 0.75rem;
        right: 1rem;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.25rem;
        pointer-events: none;
      }
      #hud-hp .hp-container {
        width: 32px;
        height: 32px;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        user-select: none;
      }

      /* ── Upgrade gauge (sprite-based, top-center) ────────────────────── */
      #hud-gauge {
        position: fixed;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        width: 320px;
        height: 32px;
        pointer-events: none;
      }
      #hud-gauge .gauge-empty,
      #hud-gauge .gauge-full {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      #hud-gauge .gauge-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        overflow: hidden;
      }
      #hud-gauge .gauge-fill .gauge-full {
        width: 320px; /* match the parent #hud-gauge width so the full bar
                         is revealed left-to-right rather than squashed */
        max-width: none;
      }
      #hud-gauge .gauge-trail {
        position: absolute;
        top: 50%;
        left: 100%;
        width: 0;
        height: 0;
        pointer-events: none;
        overflow: visible;
      }
      .gauge-trail-dot {
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 4px;
        margin: -2px 0 0 -2px;
        border-radius: 50%;
        background: #fff4a8;
        box-shadow:
          0 0 4px #ffd24a,
          0 0 8px #ff9a1f,
          0 0 14px rgba(255, 154, 31, 0.6);
        opacity: 1;
        transform: translate(0, 0) scale(0.6);
        will-change: transform, opacity;
        transition: transform 0.7s ease-out, opacity 0.7s ease-out;
      }
      .gauge-trail-dot.gauge-trail-dot-fade {
        opacity: 0;
        transform:
          translate(var(--gauge-trail-dx, 0), var(--gauge-trail-dy, 0))
          scale(1.2);
      }

      button {
        cursor: pointer;
        padding: 0.45rem 1.1rem;
        font-size: 1rem;
        border: 1px solid #888;
        background: #222;
        color: #f0f0f0;
        border-radius: 4px;
      }
      button:hover { background: #444; }

      /* Arrow indicator for gamepad-focused menu buttons */
      .menu-arrow {
        display: inline-block;
        width: 1.4em;
        color: #ffd66e;
      }

      /* Highlight outline for the gamepad-focused control inside Settings */
      .gp-focused {
        outline: 2px solid #ffd66e;
        outline-offset: 2px;
      }
      input.audio-slider.gp-focused,
      input.audio-mute.gp-focused {
        outline: 2px solid #ffd66e;
        outline-offset: 3px;
      }

      /* ── Title screen ─────────────────────────────────────────────────── */
      #title h1 {
        font-size: 3rem;
        letter-spacing: 0.08em;
      }
      .title-subtitle {
        opacity: 0.7;
        margin-bottom: 1rem;
        font-style: italic;
      }

      /* ── Level-select screen ──────────────────────────────────────────── */
      #level-select h1 {
        font-size: 2.4rem;
        letter-spacing: 0.06em;
      }
      #level-select .level-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: min(420px, 90%);
        margin: 0.5rem 0 1rem;
      }
      #level-select .level-btn {
        text-align: left;
        padding: 0.6rem 1rem;
        font-size: 1rem;
      }
      #level-select .level-btn-disabled {
        opacity: 0.45;
        cursor: not-allowed;
        font-style: italic;
      }
      #level-select .level-btn-disabled:hover { background: #222; }
      #level-select .level-back {
        margin-top: 0.25rem;
      }

      /* ── Settings overlay ─────────────────────────────────────────────── */
      #settings {
        justify-content: flex-start;
        padding: 2rem;
        overflow-y: auto;
      }
      #settings h2 { margin-bottom: 0.5rem; }
      .settings-section {
        width: min(540px, 100%);
        margin-bottom: 1.25rem;
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid #333;
        border-radius: 6px;
      }
      .settings-section h3 {
        margin-bottom: 0.5rem;
        font-size: 1.05rem;
        color: #ffd66e;
      }
      .audio-row {
        display: grid;
        grid-template-columns: 5rem 1fr 3rem auto;
        gap: 0.5rem;
        align-items: center;
        margin: 0.25rem 0;
        font-family: monospace;
      }
      .audio-mute-wrap {
        display: inline-flex;
        gap: 0.3rem;
        align-items: center;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .binding-table, .gamepad-button-table, .gamepad-axis-table {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        font-family: monospace;
        font-size: 0.9rem;
      }
      .binding-row, .gamepad-button-row, .gamepad-axis-row {
        cursor: pointer;
        padding: 0.2rem 0.4rem;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .binding-row .binding-key,
      .gamepad-button-row .binding-key {
        color: #ffd96b;
        text-align: right;
        white-space: nowrap;
      }
      .binding-row:hover,
      .gamepad-button-row:hover,
      .gamepad-axis-row:hover { background: rgba(255, 255, 255, 0.08); }
      .reset-section {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        padding: 0.25rem 0.6rem;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://vibej.am/2026/widget.js"></script>
    <title>Sock Climber</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      /* ── UI layer ─────────────────────────────────────────────────────── */
      .hidden { display: none !important; }

      /* Full-screen overlay panels */
      #title, #pause, #settings, #game-over, #level-select, #victory, #credits {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: rgba(0, 0, 0, 0.78);
        color: #f0f0f0;
        font-family: sans-serif;
        z-index: 10;
      }

      /* ── Credits screen ─────────────────────────────────────────────── */
      #credits {
        z-index: 11; /* sit above the Victory overlay during the fade */
        padding: 2rem;
      }
      #credits h2 {
        font-size: 2.5rem;
        letter-spacing: 0.06em;
        color: #ffd66e;
      }
      #credits-body {
        max-width: 640px;
        text-align: center;
        line-height: 1.55;
        font-style: italic;
        opacity: 0.9;
        white-space: pre-line;
      }
      #credits-hint {
        margin-top: 1.25rem;
        opacity: 0.65;
        font-size: 0.95rem;
      }

      /* ── Game-over: New Record banner + glitter canvas ──────────────── */
      #game-over > * {
        position: relative;
        z-index: 1;
      }
      #game-over .glitter-canvas {
        z-index: 0;
      }
      #go-new-record {
        font-size: 1.8rem;
        font-weight: bold;
        letter-spacing: 0.08em;
        margin: 0;
        background: linear-gradient(90deg, #ffd66e, #ff8ad6, #6ee7ff, #ffd66e);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 18px rgba(255, 214, 110, 0.55);
        animation: go-new-record-shimmer 2.4s linear infinite,
                   go-new-record-pop 0.5s ease-out;
      }
      @keyframes go-new-record-shimmer {
        0%   { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }
      @keyframes go-new-record-pop {
        0%   { transform: scale(0.6); opacity: 0; }
        60%  { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1.0); opacity: 1; }
      }

      /* ── Patch picker modal ──────────────────────────────────────────── */
      #patch-picker {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: rgba(0, 0, 0, 0.78);
        color: #f0f0f0;
        font-family: sans-serif;
        z-index: 20;
      }
      #patch-picker h2 {
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: #ffd66e;
      }
      #patch-picker .patch-options {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        gap: 1rem;
        width: min(960px, 95%);
        flex-wrap: wrap;
      }
      #patch-picker .patch-btn {
        position: relative;
        flex: 1 1 220px;
        max-width: 280px;
        min-width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        padding: 1rem 0.9rem 1.1rem;
        background: rgba(28, 28, 36, 0.92);
        border: 2px solid #4a4a55;
        border-radius: 10px;
        color: #f0f0f0;
        font-family: inherit;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.12s ease, background-color 0.12s ease, transform 0.12s ease;
      }
      #patch-picker .patch-btn:hover,
      #patch-picker .patch-btn:focus-visible,
      #patch-picker .patch-btn.focused {
        border-color: #ffd66e;
        background: rgba(48, 44, 28, 0.92);
        transform: translateY(-2px);
        outline: none;
      }
      #patch-picker .patch-btn .menu-arrow {
        position: absolute;
        top: 0.5rem;
        left: 0.6rem;
        color: #ffd66e;
        font-size: 1rem;
        line-height: 1;
      }
      #patch-picker .patch-skip-btn {
        margin-top: 0.6rem;
        padding: 0.55rem 1.6rem;
        font-size: 1.05rem;
        background: rgba(28, 28, 36, 0.92);
        border: 2px solid #4a4a55;
        border-radius: 8px;
        color: #d8d8d8;
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.12s ease, background-color 0.12s ease, color 0.12s ease;
      }
      #patch-picker .patch-skip-btn:hover,
      #patch-picker .patch-skip-btn:focus-visible,
      #patch-picker .patch-skip-btn.focused {
        border-color: #ffd66e;
        background: rgba(48, 44, 28, 0.92);
        color: #ffd66e;
        outline: none;
      }
      #patch-picker .patch-icon {
        width: 120px;
        height: 120px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        pointer-events: none;
      }
      #patch-picker .patch-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
      }
      #patch-picker .patch-name {
        font-size: 1.3125rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #ffd66e;
      }
      #patch-picker .patch-desc {
        font-size: 1.1rem;
        line-height: 1.35;
        color: #d8d8d8;
      }

      /* HUD — top-left corner, never blocks clicks on the game */
      #hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #f0f0f0;
        font-family: monospace;
        font-size: 1.125rem;
        z-index: 10;
        pointer-events: none;
      }

      /* ── HP container row (top-right) ────────────────────────────────── */
      #hud-hp {
        position: fixed;
        top: 0.75rem;
        right: 1rem;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.25rem;
        pointer-events: none;
      }
      #hud-hp .hp-container {
        width: 40px;
        height: 40px;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        user-select: none;
      }

      /* ── Applied-patches row (under HP indicators, top-right) ─────────── */
      #hud-patches {
        position: fixed;
        top: calc(0.75rem + 40px + 0.4rem);
        right: 1rem;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.25rem;
        flex-wrap: wrap-reverse;
        justify-content: flex-end;
        max-width: 320px;
        pointer-events: none;
      }
      #hud-patches .patch-applied {
        width: 28px;
        height: 28px;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        user-select: none;
        filter: drop-shadow(0 0 2px rgba(0,0,0,0.6));
      }

      /* ── Upgrade gauge (sprite-based, top-center) ────────────────────── */
      #hud-gauge {
        position: fixed;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 40px;
        pointer-events: none;
      }
      #hud-gauge .gauge-empty,
      #hud-gauge .gauge-full {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      #hud-gauge .gauge-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        overflow: hidden;
      }
      #hud-gauge .gauge-fill .gauge-full {
        width: 400px; /* match the parent #hud-gauge width so the full bar
                         is revealed left-to-right rather than squashed */
        max-width: none;
      }
      #hud-gauge .gauge-trail {
        position: absolute;
        top: 50%;
        left: 100%;
        width: 0;
        height: 0;
        pointer-events: none;
        overflow: visible;
      }
      .gauge-trail-dot {
        position: absolute;
        top: 0;
        left: 0;
        width: 5px;
        height: 5px;
        margin: -2.5px 0 0 -2.5px;
        border-radius: 50%;
        background: #fff4a8;
        box-shadow:
          0 0 5px #ffd24a,
          0 0 10px #ff9a1f,
          0 0 17.5px rgba(255, 154, 31, 0.6);
        opacity: 1;
        transform: translate(0, 0) scale(0.6);
        will-change: transform, opacity;
        transition: transform 0.7s ease-out, opacity 0.7s ease-out;
      }
      .gauge-trail-dot.gauge-trail-dot-fade {
        opacity: 0;
        transform:
          translate(var(--gauge-trail-dx, 0), var(--gauge-trail-dy, 0))
          scale(1.2);
      }

      /* Boss panel — top-center, level-4 only */
      #hud-boss {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 280px;
        padding: 10px 18px;
        border: 2px solid #ffaa66;
        border-radius: 6px;
        background: rgba(20, 8, 16, 0.78);
        color: #ffe6cc;
        font-family: monospace;
        text-align: center;
        pointer-events: none;
      }
      #hud-boss .boss-heading {
        font-size: 0.8rem;
        letter-spacing: 0.25em;
        color: #ff6688;
      }
      #hud-boss .boss-state {
        font-size: 1.4rem;
        font-weight: bold;
        margin: 2px 0 6px;
        color: #ffd6a8;
      }
      #hud-boss .boss-sheets,
      #hud-boss .boss-strikes,
      #hud-boss .boss-dizzy {
        font-size: 0.95rem;
        line-height: 1.3;
      }
      #hud-boss .boss-dizzy {
        color: #ff6688;
        font-weight: bold;
      }

      button {
        cursor: pointer;
        padding: 0.5625rem 1.375rem;
        font-size: 1.25rem;
        border: 1px solid #888;
        background: #222;
        color: #f0f0f0;
        border-radius: 4px;
      }
      button:hover { background: #444; }

      /* Arrow indicator for gamepad-focused menu buttons */
      .menu-arrow {
        display: inline-block;
        width: 1.4em;
        color: #ffd66e;
      }

      /* Highlight outline for the gamepad-focused control inside Settings */
      .gp-focused {
        outline: 2px solid #ffd66e;
        outline-offset: 2px;
      }
      input.audio-slider.gp-focused,
      input.audio-mute.gp-focused {
        outline: 2px solid #ffd66e;
        outline-offset: 3px;
      }

      /* ── Title screen ─────────────────────────────────────────────────── */
      #title h1 {
        font-size: 3.75rem;
        letter-spacing: 0.08em;
      }
      .title-subtitle {
        opacity: 0.7;
        margin-bottom: 1rem;
        font-style: italic;
      }

      /* ── Level-select screen ──────────────────────────────────────────── */
      #level-select h1 {
        font-size: 3rem;
        letter-spacing: 0.06em;
      }
      #level-select .level-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: min(420px, 90%);
        margin: 0.5rem 0 1rem;
      }
      #level-select .level-btn {
        text-align: left;
        padding: 0.6rem 1rem;
        font-size: 1rem;
      }
      #level-select .level-btn-disabled {
        opacity: 0.45;
        cursor: not-allowed;
        font-style: italic;
      }
      #level-select .level-btn-disabled:hover { background: #222; }
      #level-select .level-best {
        float: right;
        opacity: 0.7;
        font-size: 0.85rem;
        font-style: italic;
      }
      #level-select .level-back {
        margin-top: 0.25rem;
      }

      /* ── Settings overlay ─────────────────────────────────────────────── */
      #settings {
        justify-content: flex-start;
        padding: 2rem;
        overflow-y: auto;
      }
      #settings h2 { margin-bottom: 0.5rem; }
      .settings-section {
        width: min(540px, 100%);
        margin-bottom: 1.25rem;
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid #333;
        border-radius: 6px;
      }
      .settings-section h3 {
        margin-bottom: 0.5rem;
        font-size: 1.05rem;
        color: #ffd66e;
      }
      .audio-row {
        display: grid;
        grid-template-columns: 5rem 1fr 3rem auto;
        gap: 0.5rem;
        align-items: center;
        margin: 0.25rem 0;
        font-family: monospace;
      }
      .audio-mute-wrap {
        display: inline-flex;
        gap: 0.3rem;
        align-items: center;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .binding-table, .gamepad-button-table, .gamepad-axis-table {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        font-family: monospace;
        font-size: 0.9rem;
      }
      .binding-row, .gamepad-button-row, .gamepad-axis-row {
        cursor: pointer;
        padding: 0.2rem 0.4rem;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .binding-row .binding-key,
      .gamepad-button-row .binding-key {
        color: #ffd96b;
        text-align: right;
        white-space: nowrap;
      }
      .binding-row:hover,
      .gamepad-button-row:hover,
      .gamepad-axis-row:hover { background: rgba(255, 255, 255, 0.08); }
      .reset-section {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        padding: 0.25rem 0.6rem;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
